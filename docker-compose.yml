services:
  postgres:
    image: postgres:16
    container_name: midnight_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: midnight
    ports:
      - "5432:5432"
    volumes:
      - midnight_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d midnight"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: midnight_redis
    ports:
      - "6379:6379"
    volumes:
      - midnight_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  midnight_pgdata:
  midnight_redisdata:
